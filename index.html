<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="darkreader-lock">
    <title>𖣯 small-ui-box</title>

    <link rel="stylesheet" href="styles/base.css">
    <link rel="stylesheet" href="styles/button.css">
    <link rel="stylesheet" href="styles/view.css">
    <link rel="stylesheet" href="styles/topbar.css">
    <link rel="stylesheet" href="styles/sidebar.css">
</head>
<body>

    <div class="app-wrapper">
        <header class="top-bar">
            <div class="top-bar-left">
                <button id="save">💾 Save</button>
                <button id="load">📥 Load</button>
            </div>

            <div class="top-bar-center">
                <div class="ratio-control">
                    <div class="ratio-presets">
                        <button class="preset-btn" data-ratio="1.3333">4:3</button>
                        <button class="preset-btn" data-ratio="1.6">16:10</button>
                        <button class="preset-btn active" data-ratio="1.7778">16:9</button>
                        <button class="preset-btn" data-ratio="2.3333">21:9</button>
                        <button class="preset-btn" data-ratio="3.5556">32:9</button>
                        <button id="flipBtn">↺</button>
                    </div>
                    <input type="range" id="ratioSlider" min="-1" max="1" step="0.001" value="0.25">
                    <span id="ratioVal">1.78</span>
                </div>
            </div>

            <div class="top-bar-right">
                <button id="resetViewBtn">Reset View</button>
            </div>
        </header>

        <div class="main-layout">
            <aside class="sidebar" id="sidebar">
                <div class="boxes-panel">
                    <div class="box-actions">
                        <button id="addBtn">➕ Add</button>
                        <button id="dupBtn" style="display:none">⧉ Duplicate</button>
                    </div>
                    <div class="box-list" id="palette"></div>
                    <div class="inspector" id="inspector" style="display:none">
                        <div class="name-group">
                            <div id="colorSwatches" class="color-swatches"></div>
                            <div class="inspector-name-row">
                                <div class="name-input-wrap">
                                    <input type="text" id="inspectorName" placeholder="Name" disabled>
                                    <button id="labelPosBtn" title="Toggle label position">▲</button>
                                </div>
                            </div>
                        </div>
                        <div class="dim-rows">
                            <div class="dim-row dim-header">
                                <span class="dim-label"></span>
                                <span class="dim-col-label">Value
                                    <span class="formula-help-wrap">
                                        <button id="formulaHelpBtn" class="formula-help-btn">?</button>
                                        <div id="formulaHelp" class="formula-help-panel">
                                            Values support math expressions and variables.
                                            <table class="formula-help-table">
                                                <td>My</td><td>mx my mw mh</td></tr>
                                                <td>Screen</td><td>sx sy sw sh</td></tr>
                                                <td>Target</td><td>tx ty tw th tv</td></tr>
                                            </table>
                                        </div>
                                    </span>
                                </span>
                                <span class="dim-col-label">Target</span>
                            </div>
                            <div class="dim-row">
                                <span class="dim-label">V</span>
                                <button id="visibilityBtn">👁️</button>
                                <select id="targetV" class="dim-target"></select>
                            </div>
                            <div class="dim-row">
                                <span class="dim-label">X</span>
                                <input id="inputX" class="dim-input" type="text">
                                <select id="targetX" class="dim-target"></select>
                            </div>
                            <div class="dim-row">
                                <span class="dim-label">Y</span>
                                <input id="inputY" class="dim-input" type="text">
                                <select id="targetY" class="dim-target"></select>
                            </div>
                            <div class="dim-row">
                                <span class="dim-label">W</span>
                                <input id="inputW" class="dim-input" type="text">
                                <select id="targetW" class="dim-target"></select>
                            </div>
                            <div class="dim-row">
                                <span class="dim-label">H</span>
                                <input id="inputH" class="dim-input" type="text">
                                <select id="targetH" class="dim-target"></select>
                            </div>
                        </div>
                    </div>
                </div>
            </aside>

            <div class="resizer" id="dragbar"></div>

            <main class="editor-view">
                <canvas id="view"></canvas>
            </main>
        </div>
    </div>

    <script src="scripts/global.js"></script>
	<script src="scripts/camera.js"></script>
	<script src="scripts/view.js"></script>
	<script src="scripts/topbar.js"></script>
	<script src="scripts/sidebar.js"></script>
	<script src="scripts/boxes.js"></script>

</body>
</html>
